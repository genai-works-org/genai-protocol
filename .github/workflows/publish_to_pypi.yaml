name: Python Package CI/CD

on:
  push:
    branches: [main]
    tags: ["*.*.*"] # Trigger on version tags like v0.1.0
  workflow_dispatch: # Allows manual triggering

jobs:
  # test-and-lint:
  #   name: Test & Lint (Python ${{ matrix.python-version }})
  #   runs-on: ubuntu-latest
  #   strategy:
  #     matrix:
  #       python-version: ["3.10", "3.11", "3.12"]

  #   steps:
  #     - uses: actions/checkout@v4

  #     - name: Set up Python ${{ matrix.python-version }}
  #       uses: actions/setup-python@v5
  #       with:
  #         python-version: ${{ matrix.python-version }}
  #         cache: "pip" # Caches pip dependencies

  # - name: Install uv (Linux)
  #   run: |
  #     curl -LsSf https://astral.sh/uv/install.sh | sh
  #     echo "$HOME/.cargo/bin" >> $GITHUB_PATH

  # TODO: lint ruff + tests

  build-and-publish:
    name: Build and Publish to PyPI
    # needs: test-and-lint
    if: startsWith(github.ref, 'refs/tags/') # Only run on version tags
    runs-on: ubuntu-latest
    # environment: pypi-release # Optional: if using GitHub Environments for approval

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10" # Or your primary build version

      # - name: Install uv (Linux)
      #   run: |
      #     curl -LsSf https://astral.sh/uv/install.sh | sh
      #     echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build

        # TODO: update if other tooling is used

      - name: Build package
        run: python -m build

      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          python setup.py bdist_wheel sdist
          twine check dist/*
          twine upload dist/* --verbose
